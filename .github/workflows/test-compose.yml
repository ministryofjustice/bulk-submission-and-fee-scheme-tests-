name: Run E2E Tests via Docker Compose

concurrency:
  group: run-e2e-tests
  cancel-in-progress: false

on:
  push:
    branches: [ feature/test-compose ]

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against'
        required: false
        default: 'main'

  schedule:
    # 6pm UTC Mon–Fri
    - cron: '0 18 * * 1-5'

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Checkout claims parent repository
        uses: actions/checkout@v4
        with:
          repository: 'ministryofjustice/laa-data-claims-parent'
          path: 'laa-data-claims-parent'
          submodules: recursive
          fetch-depth: 0

      - name: Prepare GitHub secrets for Docker build
        run: |
          echo "${{ github.actor }}" > github_actor.txt
          echo "${{ secrets.GITHUB_TOKEN }}" > github_token.txt

      - name: Build and start services
        working-directory: ./laa-data-claims-parent
        shell: bash
        run: |
          # Create temporary secret files from GitHub secrets
          echo "${GITHUB_ACTOR}" > github_actor.txt
          echo "${GITHUB_TOKEN}" > github_token.txt
      
          # Build and start services with secrets for BuildKit
          docker compose build \
          --secret id=github_actor,src=github_actor.txt \
          --secret id=github_token,src=github_token.txt
          docker compose up -d claims-api event-service sabc-ui --build
      
          # Clean up temporary secret files
          rm github_actor.txt github_token.txt

      - name: Wait for services
        working-directory: ./laa-data-claims-parent
        shell: bash
        run: |
          docker compose -f docker-compose.yml ps

      - name: Tear down
        if: ${{ always() }}
        working-directory: ./laa-data-claims-parent
        shell: bash
        run: |
          docker compose down claims-api event-service sabc-ui -v;