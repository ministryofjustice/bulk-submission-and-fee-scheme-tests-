name: "Port forward to service"

inputs:
  kube_namespace:
    description: "Namespace that contains the target service"
    required: true
    type: string

  service_name:
    description: "Name of the Kubernetes service to port-forward"
    required: true
    type: string

  local_port:
    description: "Local port to bind"
    required: true
    type: string

  remote_port:
    description: "Remote service port (defaults to local_port)"
    required: false
    type: string
    default: ""

  pid_env_var:
    description: "Environment variable name that will hold the port-forward PID"
    required: false
    type: string
    default: "PORT_FORWARD_PID"

  wait_for_port:
    description: "Port to check with wait-for-port.sh (defaults to local_port)"
    required: false
    type: string
    default: ""

  wait_label:
    description: "Friendly label for wait script"
    required: false
    type: string
    default: ""

  wait_script:
    description: "Path to wait-for-port script"
    required: false
    type: string
    default: "./scripts/wait-for-port.sh"

runs:
  using: "composite"
  steps:
    - name: Port forward service
      shell: bash
      env:
        KUBE_NAMESPACE: ${{ inputs.kube_namespace }}
        SERVICE_NAME: ${{ inputs.service_name }}
        LOCAL_PORT: ${{ inputs.local_port }}
        REMOTE_PORT_INPUT: ${{ inputs.remote_port }}
        PID_ENV_VAR: ${{ inputs.pid_env_var }}
        WAIT_PORT_INPUT: ${{ inputs.wait_for_port }}
        WAIT_LABEL: ${{ inputs.wait_label }}
        WAIT_SCRIPT: ${{ inputs.wait_script }}
      run: |
        set -euo pipefail

        if [ -z "$KUBE_NAMESPACE" ]; then
          echo "kube_namespace input is required" >&2
          exit 1
        fi

        if [ -z "$SERVICE_NAME" ]; then
          echo "service_name input is required" >&2
          exit 1
        fi

        if [ -z "$LOCAL_PORT" ]; then
          echo "local_port input is required" >&2
          exit 1
        fi

        # Determine remote port
        REMOTE_PORT="$REMOTE_PORT_INPUT"
        if [ -z "$REMOTE_PORT" ]; then
          REMOTE_PORT="$LOCAL_PORT"
        fi

        echo "Port forwarding service: $SERVICE_NAME ($LOCAL_PORT -> $REMOTE_PORT)"
        LOG_FILE="pf-${LOCAL_PORT}.log"

        kubectl port-forward -n "$KUBE_NAMESPACE" svc/"$SERVICE_NAME" "${LOCAL_PORT}:${REMOTE_PORT}" > "$LOG_FILE" 2>&1 &
        PORT_FORWARD_PID=$!
        echo "Port-forward started with PID $PORT_FORWARD_PID (log: $LOG_FILE)"

        echo "${PID_ENV_VAR}=${PORT_FORWARD_PID}" >> "$GITHUB_ENV"

        # Determine port for wait script
        WAIT_PORT="$WAIT_PORT_INPUT"
        if [ -z "$WAIT_PORT" ]; then
          WAIT_PORT="$LOCAL_PORT"
        fi

        # Run wait script if present
        if [ -n "$WAIT_SCRIPT" ] && [ -f "$WAIT_SCRIPT" ]; then
          WAIT_NAME="$WAIT_LABEL"
          if [ -z "$WAIT_NAME" ]; then
            WAIT_NAME="port-${WAIT_PORT}"
          fi
          "$WAIT_SCRIPT" "$WAIT_PORT" "$WAIT_NAME"
        else
          echo "Wait script '$WAIT_SCRIPT' not found, skipping wait." >&2
        fi
