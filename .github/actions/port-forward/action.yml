name: "Port forward to pod"

inputs:
  kube_namespace:
    description: "Namespace that contains the target pod"
    required: true
  pod_selector:
    description: "Label selector used to resolve the pod"
    required: true
  local_port:
    description: "Local port to bind"
    required: true
  remote_port:
    description: "Remote pod port to forward to (defaults to local_port)"
    required: false
    default: ""
  pid_env_var:
    description: "Environment variable name that will hold the port-forward PID"
    required: false
    default: "PORT_FORWARD_PID"
  wait_for_port:
    description: "Port number to probe with wait-for-port.sh (defaults to local_port)"
    required: false
    default: ""
  wait_label:
    description: "Friendly label passed to wait-for-port.sh"
    required: false
    default: ""
  wait_script:
    description: "Path to the wait-for-port script"
    required: false
    default: "./scripts/wait-for-port.sh"

runs:
  using: "composite"
  steps:
    - name: Port forward
      shell: bash
      env:
        KUBE_NAMESPACE: ${{ inputs.kube_namespace }}
        POD_SELECTOR: ${{ inputs.pod_selector }}
        LOCAL_PORT: ${{ inputs.local_port }}
        REMOTE_PORT_INPUT: ${{ inputs.remote_port }}
        PID_ENV_VAR: ${{ inputs.pid_env_var }}
        WAIT_PORT_INPUT: ${{ inputs.wait_for_port }}
        WAIT_LABEL: ${{ inputs.wait_label }}
        WAIT_SCRIPT: ${{ inputs.wait_script }}
      run: |
        set -euo pipefail

        echo "🔍 Resolving pod for selector '$POD_SELECTOR' in namespace '$KUBE_NAMESPACE'..."
        POD_NAME=$(kubectl get pod -n "$KUBE_NAMESPACE" -l "$POD_SELECTOR" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
        if [ -z "$POD_NAME" ]; then
          echo "⚠️ WARNING: Could not resolve pod name — continuing without it."
          POD_NAME="unknown"
        fi

        echo "🚀 Port forwarding pod: $POD_NAME ($LOCAL_PORT → ${REMOTE_PORT_INPUT:-$LOCAL_PORT})"
        LOG_FILE="pf-${LOCAL_PORT}.log"
        kubectl port-forward -n "$KUBE_NAMESPACE" pod/"$POD_NAME" "${LOCAL_PORT}:${REMOTE_PORT_INPUT:-$LOCAL_PORT}" > "$LOG_FILE" 2>&1 &
        PORT_FORWARD_PID=$!
        echo "✅ Port-forward started with PID $PORT_FORWARD_PID (log: $LOG_FILE)"

        # Export environment vars
        echo "${PID_ENV_VAR}=${PORT_FORWARD_PID}" >> "$GITHUB_ENV"
        echo "POD_NAME_${PID_ENV_VAR}=${POD_NAME}" >> "$GITHUB_ENV"

        # Record port meta info for restart logic
        mkdir -p .portmeta
        META_FILE=".portmeta/${WAIT_LABEL:-port-${LOCAL_PORT}}.json"
        echo "{\"name\": \"${WAIT_LABEL:-port-${LOCAL_PORT}}\", \"namespace\": \"$KUBE_NAMESPACE\", \"podName\": \"$POD_NAME\", \"port\": ${LOCAL_PORT}, \"pidEnvVar\": \"${PID_ENV_VAR}\"}" > "$META_FILE"
        echo "📝 Saved metadata: $META_FILE"
        cat "$META_FILE"

        WAIT_PORT="${WAIT_PORT_INPUT:-$LOCAL_PORT}"
        if [ -n "$WAIT_SCRIPT" ] && [ -f "$WAIT_SCRIPT" ]; then
          "$WAIT_SCRIPT" "$WAIT_PORT" "${WAIT_LABEL:-port-${LOCAL_PORT}}"
        else
          echo "⏭️ Skipping wait-for-port check (script missing or not defined)."
        fi
