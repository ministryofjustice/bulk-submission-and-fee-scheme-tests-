name: Run UI Feature Tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch or ref to run tests against'
        required: false
        default: main
      feature:
        description: 'Feature file to execute'
        required: true
        default: all
        type: choice
        options:
          - all
          - bulkSubmission
          - content
          - fileUploadValidation
          - search
          - submissionValidation
          - temp
      tags:
        description: 'Optional Cucumber tag expression (e.g. @smoke and not @wip)'
        required: false
      name:
        description: 'Optional scenario name or regex to target a single test'
        required: false
  workflow_call:
    inputs:
      branch:
        required: false
        type: string
        default: ''
      feature:
        required: false
        type: string
        default: all
      tags:
        required: false
        type: string
      name:
        required: false
        type: string

jobs:
  prepare-auth-context:
    name: Prepare UI auth context
    runs-on: ubuntu-latest
    environment: uat
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-jammy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || github.ref }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Install dependencies
        run: npm ci

      - name: Authenticate to the SaBC EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_SUBMIT_A_BULK_CLAIM_UAT }}

      - name: Port forward to SaBC pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          pod_selector: app.kubernetes.io/name=uat-submit-a-bulk-claim
          local_port: '8082'
          pid_env_var: PORT_FORWARD_PID_SABC
          wait_label: sabc

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          DSTEW_API_BASE_URL=${{ secrets.DSTEW_API_BASE_URL }}
          DSTEW_API_TOKEN=${{ secrets.DSTEW_API_TOKEN }}
          MFA_SECRET=${{ secrets.MFA_SECRET }}
          PASSWORD=${{ secrets.PASSWORD }}
          UI_BASE_URL=${{ secrets.UI_BASE_URL }}
          USERNAME=${{ secrets.USERNAME }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSL=${{ secrets.DB_SSL }}
          HEADLESS=true
          EOF

      - name: Generate Playwright storage state
        run: npm run login

      - name: Upload storage state
        uses: actions/upload-artifact@v4
        with:
          name: ui-auth-context
          path: storageState.json
          if-no-files-found: error
          retention-days: 1

  run-ui-feature:
    name: UI feature - ${{ matrix.feature }}
    needs: prepare-auth-context
    runs-on: ubuntu-latest
    environment: uat
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-jammy
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(inputs.feature != 'all' && format('["{0}"]', inputs.feature) || '["bulkSubmission","content","fileUploadValidation","search","submissionValidation"]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch != '' && inputs.branch || github.ref }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Install dependencies
        run: npm ci

      - name: Download auth context
        uses: actions/download-artifact@v4
        with:
          name: ui-auth-context
          path: .

      - name: Authenticate to the DSTEW EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_API_UAT }}

      - name: Port forward to data claims db
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          pod_selector: run=port-forward-pod
          local_port: '5432'
          pid_env_var: PORT_FORWARD_PID_DSTEW_DB
          wait_label: dstew-db

      - name: Port forward to data claims api
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          pod_selector: app.kubernetes.io/name=data-claims-api,app.kubernetes.io/instance=main
          local_port: '8080'
          pid_env_var: PORT_FORWARD_PID_DSTEW_API
          wait_label: dstew-api

      - name: Authenticate to the SaBC EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_SUBMIT_A_BULK_CLAIM_UAT }}

      - name: Port forward to SaBC pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          pod_selector: app.kubernetes.io/name=uat-submit-a-bulk-claim
          local_port: '8082'
          pid_env_var: PORT_FORWARD_PID_SABC
          wait_label: sabc

      - name: Authenticate to the FSP EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}

      - name: Port forward to FPS-API pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          pod_selector: app.kubernetes.io/name=laa-fee-scheme-api
          local_port: '8085'
          pid_env_var: PORT_FORWARD_PID
          wait_label: fsp-api

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          DSTEW_API_BASE_URL=${{ secrets.DSTEW_API_BASE_URL }}
          DSTEW_API_TOKEN=${{ secrets.DSTEW_API_TOKEN }}
          MFA_SECRET=${{ secrets.MFA_SECRET }}
          PASSWORD=${{ secrets.PASSWORD }}
          UI_BASE_URL=${{ secrets.UI_BASE_URL }}
          USERNAME=${{ secrets.USERNAME }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSL=${{ secrets.DB_SSL }}
          HEADLESS=true
          EOF

      - name: Run UI tests for ${{ matrix.feature }}
        shell: bash
        env:
          TAGS: ${{ inputs.tags }}
          SCENARIO_NAME: ${{ inputs.name }}
        run: |
          set -euo pipefail

          FEATURE="${{ matrix.feature }}"
          case "$FEATURE" in
            bulkSubmission) FEATURE_PATH="tests/features/ui/BulkSubmission/bulkSubmission.feature" ;;
            content) FEATURE_PATH="tests/features/ui/BulkSubmission/content.feature" ;;
            fileUploadValidation) FEATURE_PATH="tests/features/ui/BulkSubmission/fileUploadValidation.feature" ;;
            search) FEATURE_PATH="tests/features/ui/BulkSubmission/search.feature" ;;
            submissionValidation) FEATURE_PATH="tests/features/ui/BulkSubmission/submissionValidation.feature" ;;
            duplicateChecksLegalHelp) FEATURE_PATH="tests/features/ui/BulkSubmission/duplicateChecksLegalHelp.feature" ;;
            *)
              echo "Unrecognised feature '$FEATURE'"
              exit 1
              ;;
          esac

          ./scripts/wait-for-port.sh 5432 dstew-db
          ./scripts/wait-for-port.sh 8080 dstew-api
          ./scripts/wait-for-port.sh 8082 sabc
          ./scripts/wait-for-port.sh 8085 fsp-api

          mkdir -p "reports/$FEATURE"

          TAG_ARGS=()
          if [ -n "${TAGS:-}" ]; then
            TAG_ARGS+=(--tags "$TAGS")
          fi

          NAME_ARGS=()
          if [ -n "${SCENARIO_NAME:-}" ]; then
            NAME_ARGS+=(--name "$SCENARIO_NAME")
          fi

          npx cucumber-js \
            --require-module ts-node/register \
            --require "tests/features/**/*.ts" \
            --format "json:reports/$FEATURE/cucumber.json" \
            --format "html:reports/$FEATURE/cucumber.html" \
            --retry 1 \
            "${TAG_ARGS[@]}" \
            "${NAME_ARGS[@]}" \
            "$FEATURE_PATH"

      - name: Publish Cucumber summary
        if: always()
        env:
          CUCUMBER_JSON: reports/${{ matrix.feature }}/cucumber.json
        run: node scripts/cucumber-summary.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-${{ matrix.feature }}-reports
          path: reports/${{ matrix.feature }}
          if-no-files-found: warn
