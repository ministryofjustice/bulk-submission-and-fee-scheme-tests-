name: Run E2E Tests via Docker Compose

on:
  push:
    branches: [ feature/test-compose ]

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against'
        required: false
        default: 'main'

  schedule:
    # 6pm UTC Mon–Fri
    - cron: '0 18 * * 1-5'

jobs:
  get-app-versions:
    runs-on: ubuntu-latest
    outputs:
      sabc_image_tag: ${{ steps.sabc.outputs.image_tag }}
      claims_events_image_tag: ${{ steps.claims_events.outputs.image_tag }}
      claims_api_image_tag: ${{ steps.claims_api.outputs.image_tag }}
      fsp_api_image_tag: ${{ steps.fsp_api.outputs.image_tag }}
    # TODO: Switch environment to UAT after copying the secrets to the UAT environment
    environment: uat
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Authenticate to the SaBC EKS cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube-sa: deploy-user

      - name: Collect SaBC version
        id: sabc
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: uat-submit-a-bulk-claim
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          friendly_name: Submit a Bulk Claim

      - name: Authenticate to the Claims API EKS cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_API_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_API_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_API_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          kube-sa: deploy-user

      - name: Collect Claims API version
        id: claims_api
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: main-data-claims-api
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          friendly_name: Data Claims API

      - name: Authenticate to the FSP API EKS cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube-sa: deploy-user

      - name: Collect FSP API version
        id: fsp_api
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: laa-fee-scheme-api-deployment
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          friendly_name: FSP API


      - name: Authenticate to the Claims Event Service EKS cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube-sa: deploy-user

      - name: Collect Claims Event Service version
        id: claims_events
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: uat-data-claims-events
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          friendly_name: Data Claims Events

      - name: Publish UAT deployment summary
        run: |
          {
            echo "## UAT deployment versions"
            echo ""
            echo "| Service | Context | Image tag | Release time | Status |"
            echo "| --- | --- | --- | --- | --- |"
            echo "| Submit a Bulk Claim | ${{ steps.sabc.outputs.context }} | ${{ steps.sabc.outputs.image_tag }} | ${{ steps.sabc.outputs.release_time }} | ${{ steps.sabc.outputs.status }} |"
            echo "| Data Claims Events | ${{ steps.claims_events.outputs.context }} | ${{ steps.claims_events.outputs.image_tag }} | ${{ steps.claims_events.outputs.release_time }} | ${{ steps.claims_events.outputs.status }} |"
            echo "| Data Claims API | ${{ steps.claims_api.outputs.context }} | ${{ steps.claims_api.outputs.image_tag }} | ${{ steps.claims_api.outputs.release_time }} | ${{ steps.claims_api.outputs.status }} |"
            echo "| FSP API | ${{ steps.fsp_api.outputs.context }} | ${{ steps.fsp_api.outputs.image_tag }} | ${{ steps.fsp_api.outputs.release_time }} | ${{ steps.fsp_api.outputs.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  ensure-runner-available:
    name: Ensure GitHub Runner Available
    environment: uat
    runs-on: ubuntu-latest
    outputs:
      deploy-runner: ${{ steps.check-runner.outputs.deploy-runner }}
    env:
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
      KUBE_TOKEN: ${{ secrets.KUBE_TOKEN_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
      KUBE_CERT: ${{ secrets.KUBE_CERT_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
      ECR_REGION: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
      ECR_ROLE: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Kubernetes Cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ env.KUBE_CERT }}
          kube-token: ${{ env.KUBE_TOKEN }}
          kube-cluster: ${{ env.KUBE_CLUSTER }}
          kube-namespace: ${{ env.KUBE_NAMESPACE }}
          kube-sa: laa-submit-a-bulk-claim-e2e-test-uat-service-account-role

      - name: Check Runner Pod/Release
        id: check-runner
        run: |
          set +e
          echo "Checking if e2e-github-runner Helm release is deployed and pod is running..."
          helm status e2e-github-runner --namespace ${KUBE_NAMESPACE} > /dev/null 2>&1
          HELM_STATUS=$?
          POD_STATUS=$(kubectl get pods -n ${KUBE_NAMESPACE} -l app=e2e-github-runner -o jsonpath='{.items[0].status.phase}' 2>/dev/null)
          if [ "$HELM_STATUS" -eq 0 ] && [ "$POD_STATUS" = "Running" ]; then
            echo "Runner release and pod are present and running."
            echo "deploy-runner=false" >> $GITHUB_OUTPUT
          else
            echo "Runner not present or not running, will deploy."
            echo "deploy-runner=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to ECR
        if: steps.check-runner.outputs.deploy-runner == 'true'
        id: ecr-auth
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/ecr-auth@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          ecr_region: ${{ env.ECR_REGION }}
          ecr_role: ${{ env.ECR_ROLE }}
          role-session-name: ${{ github.run_id }}-runner-deploy

      - name: Build and Push Runner Image
        if: steps.check-runner.outputs.deploy-runner == 'true'
        id: build
        uses: docker/build-push-action@v6.18.0
        with:
          context: ./scripts
          file: ./scripts/Dockerfile.e2e-runner
          push: true
          tags: |
            ${{ steps.ecr-auth.outputs.image_registry }}/${{ vars.ECR_REPOSITORY }}:github-runner-${{ github.run_id }}

      - name: Deploy Runner
        if: steps.check-runner.outputs.deploy-runner == 'true'
        env:
          REGISTRY: ${{ steps.ecr-auth.outputs.image_registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
        run: |
          echo "Deploying persistent GitHub runner..."
          helm upgrade --install e2e-github-runner ./.helm/github-runner \
            --namespace ${KUBE_NAMESPACE} \
            --set image.repository=${REGISTRY}/${REPOSITORY} \
            --set image.tag=github-runner-${{ github.run_id }} \
            --wait \
            --timeout 5m
          
          echo "Checking runner logs for successful registration..."
          for i in {1..30}; do
            if kubectl logs -l app=e2e-github-runner -n ${KUBE_NAMESPACE} | grep -Eq "Registered|Listening for Jobs|Connected to GitHub"; then
              echo "Runner logged successful registration."
              break
            fi
            sleep 5
          done
  
  

  run-accessibility-tests:
    needs: get-app-versions
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci; npx playwright install

      - name: Pull SABC image
        uses: ./.github/actions/pull-ecr-image
        with:
          role-to-assume: ${{ secrets.LAA_SUBMIT_A_BULK_CLAIM_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
          registry-account: ${{ secrets.ECR_ACCOUNT }}
          repository: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}
          #image-tag: ${{ needs.get-app-versions.outputs.sabc_image_tag }}
          image-tag: submit-a-bulk-claim-1.0.128-SNAPSHOT-9497014

      - name: Pull Event Service image
        uses: ./.github/actions/pull-ecr-image
        with:
          role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REGION }}
          registry-account: ${{ secrets.ECR_ACCOUNT }}
          repository: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REPOSITORY }}
          image-tag: ${{ needs.get-app-versions.outputs.claims_events_image_tag }}

      - name: Pull Claims API image
        uses: ./.github/actions/pull-ecr-image
        with:
          role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          registry-account: ${{ secrets.ECR_ACCOUNT }}
          repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          image-tag: ${{ needs.get-app-versions.outputs.claims_api_image_tag }}

      - name: Build Mock OIDC Server
        uses: ./.github/actions/build-mock-oidc
        id: build-mock-oidc

      - name: Authenticate to Kubernetes Cluster
        uses: ministryofjustice/laa-reusable-github-actions/.github/actions/authenticate_to_cluster@768f673017edbb793cf052fa159c272d6c1f9177
        with:
          kube-cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}
          kube-token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube-sa: deploy-user


      - name: Port forward to FPS-API pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          pod_selector: app.kubernetes.io/name=laa-fee-scheme-api
          local_port: "8085"
          pid_env_var: PORT_FORWARD_PID
          wait_label: fsp-api

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          UI_BASE_URL=http://127.0.0.1:8082
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          PDA_API_BASE_URL=${{ secrets.PDA_API_BASE_URL }}
          PDA_API_TOKEN=${{ secrets.PDA_API_TOKEN }}
          PROVIDER_API=${{ secrets.PDA_API_BASE_URL }}
          PROVIDER_API_KEY=${{ secrets.PDA_API_TOKEN }}
          DSTEW_API_BASE_URL=localhost:8080
          DSTEW_API_TOKEN=f67f968e-b479-4e61-b66e-f57984931e56
          MFA_SECRET=${{ secrets.MFA_SECRET }}
          PASSWORD=${{ secrets.PASSWORD }}
          USERNAME=${{ secrets.USERNAME }}
          DB_HOST=jdbc:postgresql://localhost
          DB_PORT=5432
          DB_USER=user
          DB_PASS=dev
          DB_NAME=laa_data_claims_api_dev
          DB_SSL=${{ secrets.DB_SSL }}
          HEADLESS=true
          AUTH_CLIENT_ID=${{ secrets.AUTH_CLIENT_ID }}
          AUTH_CLIENT_SECRET=${{ secrets.AUTH_CLIENT_SECRET }}
          AUTH_TENANT_ID=${{ secrets.AUTH_TENANT_ID }}
          AUTH_SCOPE=openid, profile
          EOF

      # This step is required to allow E2E to use http://oidc:9000, just like the containers would. This keeps
      # the host name the same, generating a valid JWT for SaBC.
      - name: Map OIDC to localhost
        shell: bash
        run: |
          echo "127.0.0.1 oidc" | sudo tee -a /etc/hosts

      - name: Run services
        shell: bash
        run: |
          docker compose -f docker-compose.yml up sabc-ui  event-service claims-api -d
        env:
          ECR_ACCOUNT: ${{ secrets.ECR_ACCOUNT }}
          ECR_CLAIMS_API_REPOSITORY: ${{ vars.ECR_CLAIMS_API_REPOSITORY }}
          LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REPOSITORY }}
          LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REPOSITORY: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REPOSITORY }}
          LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION: ${{ vars.LAA_SUBMIT_A_BULK_CLAIM_ECR_REGION }}
          LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REGION: ${{ vars.LAA_DATA_CLAIMS_EVENT_SERVICE_ECR_REGION }}
          LAA_DATA_CLAIMS_API_ECR_REGION: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          LAA_DATA_CLAIMS_API_ECR_REPOSITORY: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          SABC_TAG: submit-a-bulk-claim-1.0.128-SNAPSHOT-9497014
          #SABC_TAG: ${{ needs.get-app-versions.outputs.sabc_image_tag }}
          EVENT_SERVICE_TAG: ${{ needs.get-app-versions.outputs.claims_events_image_tag }}
          CLAIMS_API_TAG: ${{ needs.get-app-versions.outputs.claims_api_image_tag }}

      - name: Wait for sabc-ui health
        shell: bash
        run: |
          set -euo pipefail
          
          for i in {1..36}; do
            echo "Checking sabc-ui health... attempt $i/36"
          
            if curl -fsS http://localhost:8181/actuator/health | grep -q '"status":"UP"'; then
              echo "sabc-ui is healthy"
              exit 0
            fi
          
            # Print logs to help with debugging
            docker logs submit-a-bulk-claim-app
            sleep 5
          done
          
          echo "sabc-ui did not become healthy in time"
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs sabc-ui
          exit 1

      - name: Wait for claims-api health
        shell: bash
        run: |
          set -euo pipefail
          
          for i in {1..36}; do
            echo "Checking claims-api health... attempt $i/36"
          
            if curl -fsS http://localhost:8183/actuator/health | grep -q '"status":"UP"'; then
              echo "claims-api is healthy"
              exit 0
            fi
          
            # Print logs to help with debugging
            docker logs data-claims-api-app
            sleep 5
          done
          
          echo "claims-api did not become healthy in time"
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs data-claims-api-app
          exit 1

      - name: Login
        shell: bash
        run: npm run login:mock

      - name: Run accessibility tests
        shell: bash
        #run: npm run test:accessibility:browserstack
        run: npm run test -- --tags "@accessibility"  --parallel 8 --retry 1

      - name: Teardown (global cleanup)
        if: always()
        run: |
          npm run teardown
          docker compose down -v;

      - name: Publish Cucumber summary
        if: always()
        run: node scripts/cucumber-summary.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-accessibility-reports
          path: reports
          if-no-files-found: warn


