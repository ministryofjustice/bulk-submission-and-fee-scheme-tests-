name: Run E2E Tests

concurrency:
  group: run-e2e-tests
  cancel-in-progress: false

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against'
        required: false
        default: 'main'

  schedule:
    # 6pm UTC Mon–Fri
    - cron: '0 18 * * 1-5'

jobs:
  uat-version-summary:
    name: UAT deployment summary
    environment: uat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Authenticate to the SaBC EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_SUBMIT_A_BULK_CLAIM_UAT }}

      - name: Collect SaBC version
        id: sabc
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: uat-submit-a-bulk-claim
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          friendly_name: Submit a Bulk Claim

      - name: Authenticate to the Claims API EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_API_UAT }}

      - name: Collect Claims API version
        id: claims_api
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: main-data-claims-api
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          friendly_name: Data Claims API

      - name: Authenticate to the FSP API EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}

      - name: Collect FSP API version
        id: fsp_api
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: laa-fee-scheme-api-deployment
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          friendly_name: FSP API

      - name: Authenticate to the Claims Event Service EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}

      - name: Collect Claims Event Service version
        id: claims_events
        uses: ./.github/actions/collect-deployment-version
        with:
          deployment: uat-data-claims-events
          namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_EVENT_SERVICE_UAT }}
          friendly_name: Data Claims Events

      - name: Publish UAT deployment summary
        run: |
          {
            echo "## UAT deployment versions"
            echo ""
            echo "| Service | Context | Image tag | Release time | Status |"
            echo "| --- | --- | --- | --- | --- |"
            echo "| Submit a Bulk Claim | ${{ steps.sabc.outputs.context }} | ${{ steps.sabc.outputs.image_tag }} | ${{ steps.sabc.outputs.release_time }} | ${{ steps.sabc.outputs.status }} |"
            echo "| Data Claims Events | ${{ steps.claims_events.outputs.context }} | ${{ steps.claims_events.outputs.image_tag }} | ${{ steps.claims_events.outputs.release_time }} | ${{ steps.claims_events.outputs.status }} |"
            echo "| Data Claims API | ${{ steps.claims_api.outputs.context }} | ${{ steps.claims_api.outputs.image_tag }} | ${{ steps.claims_api.outputs.release_time }} | ${{ steps.claims_api.outputs.status }} |"
            echo "| FSP API | ${{ steps.fsp_api.outputs.context }} | ${{ steps.fsp_api.outputs.image_tag }} | ${{ steps.fsp_api.outputs.release_time }} | ${{ steps.fsp_api.outputs.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  api-tests:
    needs: uat-version-summary
    environment: uat
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-jammy 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Authenticate to the EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          HEADLESS=true
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Port forward to FPS-API pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          pod_selector: app.kubernetes.io/name=laa-fee-scheme-api
          local_port: "8085"
          pid_env_var: PORT_FORWARD_PID
          wait_label: fsp-api

      - name: Run API Tests
        run: |
          npm run test:api

      - name: Publish Cucumber summary
        if: always()
        run: node scripts/cucumber-summary.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsp-api-reports
          path: reports
          if-no-files-found: warn

  ui-accessibility-tests:
    needs: uat-version-summary
    environment: uat
    runs-on: [self-hosted, uat, k8s]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          DSTEW_API_BASE_URL=${{ secrets.DSTEW_API_BASE_URL }}
          DSTEW_API_TOKEN=${{ secrets.DSTEW_API_TOKEN }}
          PROVIDER_API=${{ secrets.PDA_API_BASE_URL }}
          PROVIDER_API_KEY=${{ secrets.PDA_API_TOKEN }}
          MFA_SECRET=${{ secrets.MFA_SECRET }}
          PASSWORD=${{ secrets.PASSWORD }}
          UI_BASE_URL=${{ vars.UI_LOGIN_URL }}
          USERNAME=${{ secrets.USERNAME }}
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSL=${{ secrets.DB_SSL }}
          BROWSERSTACK_USERNAME=${{secrets.BROWSERSTACK_USERNAME}}
          BROWSERSTACK_ACCESS_KEY=${{secrets.BROWSERSTACK_ACCESS_KEY}}
          BROWSERSTACK_LOCAL_IDENTIFIER=run-${{ github.run_number }}
          GITHUB_RUN_NUMBER=${{ github.run_number }}
          HEADLESS=true
          EOF

      - name: Run Accessibility Tests
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          CUCUMBER_TAGS: ${{ inputs.tags }}
        run: |
          npm run login
          npm run teardown
          npm run test:accessibility:browserstack

      - name: Teardown (global cleanup)
        if: always()
        run: npm run teardown

      - name: Publish Cucumber summary
        if: always()
        run: node scripts/cucumber-summary.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-accessibility-reports
          path: reports
          if-no-files-found: warn

  ui-tests:
    needs: uat-version-summary
    environment: uat
    runs-on: [self-hosted, uat, k8s]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          DSTEW_API_BASE_URL=${{ secrets.DSTEW_API_BASE_URL }}
          DSTEW_API_TOKEN=${{ secrets.DSTEW_API_TOKEN }}
          PROVIDER_API=${{ secrets.PDA_API_BASE_URL }}
          PROVIDER_API_KEY=${{ secrets.PDA_API_TOKEN }}
          MFA_SECRET=${{ secrets.MFA_SECRET }}
          PASSWORD=${{ secrets.PASSWORD }}
          UI_BASE_URL=${{ vars.UI_LOGIN_URL }}
          USERNAME=${{ secrets.USERNAME }}
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSL=${{ secrets.DB_SSL }}
          BROWSERSTACK_USERNAME=${{secrets.BROWSERSTACK_USERNAME}}
          BROWSERSTACK_ACCESS_KEY=${{secrets.BROWSERSTACK_ACCESS_KEY}}
          BROWSERSTACK_LOCAL_IDENTIFIER=run-${{ github.run_number }}
          GITHUB_RUN_NUMBER=${{ github.run_number }}
          HEADLESS=true
          EOF

      - name: Run UI Tests
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          CUCUMBER_TAGS: ${{ inputs.tags }}
        run: |
          npm run login
          npm run teardown
          npm run test:e2e:browserstack

      - name: Teardown (global cleanup)
        if: always()
        run: npm run teardown

      - name: Publish Cucumber summary
        if: always()
        run: node scripts/cucumber-summary.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-reports
          path: reports
          if-no-files-found: warn
