name: Run E2E Tests

concurrency:
  group: run-e2e-tests
  cancel-in-progress: false

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against'
        required: false
        default: 'main'

jobs:
  api-tests:
    environment: uat
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-jammy 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Authenticate to the EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          HEADLESS=true
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Port forward to FPS-API pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          pod_selector: app.kubernetes.io/name=laa-fee-scheme-api
          local_port: "8085"
          pid_env_var: PORT_FORWARD_PID
          wait_label: fsp-api

      - name: Run API Tests
        run: |
          npm run test:api

      - name: Publish Cucumber summary
        if: always()
        run: node scripts/cucumber-summary.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsp-api-reports
          path: reports
          if-no-files-found: warn

  ui-tests:
    environment: uat
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-jammy 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Install dependencies
        run: npm ci
      
      - name: Authenticate to the DSTEW EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_API_UAT }}

      - name: Port forward to data claims db
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          pod_selector: run=port-forward-pod
          local_port: "5432"
          pid_env_var: PORT_FORWARD_PID_DSTEW_DB
          wait_label: dstew-db

      - name: Port forward to data claims api
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          pod_selector: app.kubernetes.io/name=data-claims-api,app.kubernetes.io/instance=main
          local_port: "8080"
          pid_env_var: PORT_FORWARD_PID_DSTEW_API
          wait_label: dstew-api
      
      - name: Authenticate to the SaBC EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_SUBMIT_A_BULK_CLAIM_UAT }}

      - name: Port forward to SaBC pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          pod_selector: app.kubernetes.io/name=uat-submit-a-bulk-claim
          local_port: "8082"
          pid_env_var: PORT_FORWARD_PID_SABC
          wait_label: sabc

      - name: Authenticate to the FSP EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}

      - name: Port forward to FPS-API pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          pod_selector: app.kubernetes.io/name=laa-fee-scheme-api
          local_port: "8085"
          pid_env_var: PORT_FORWARD_PID
          wait_label: fsp-api
      
      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          DSTEW_API_BASE_URL=${{ secrets.DSTEW_API_BASE_URL }}
          DSTEW_API_TOKEN=${{ secrets.DSTEW_API_TOKEN }}
          MFA_SECRET=${{ secrets.MFA_SECRET }}
          PASSWORD=${{ secrets.PASSWORD }}
          UI_BASE_URL=${{ secrets.UI_BASE_URL }}
          USERNAME=${{ secrets.USERNAME }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSL=${{ secrets.DB_SSL }}
          BROWSERSTACK_USERNAME=${{secrets.BROWSERSTACK_USERNAME}}
          BROWSERSTACK_ACCESS_KEY=${{secrets.BROWSERSTACK_ACCESS_KEY}}
          BROWSERSTACK_LOCAL_IDENTIFIER=run-${{ github.run_number }}
          GITHUB_RUN_NUMBER=${{ github.run_number }}
          HEADLESS=true
          EOF
          

      - name: Record port-forward metadata (DSTEW DB)
        if: always()
        shell: bash
        run: |
          mkdir -p .portmeta
          echo "{\"name\": \"dstew-db\", \"namespace\": \"${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}\", \"podSelector\": \"run=port-forward-pod\", \"port\": 5432, \"pidEnvVar\": \"PORT_FORWARD_PID_DSTEW_DB\"}" > .portmeta/dstew-db.json

      - name: Record port-forward metadata (DSTEW API)
        if: always()
        shell: bash
        run: |
          echo "{\"name\": \"dstew-api\", \"namespace\": \"${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}\", \"podSelector\": \"app.kubernetes.io/name=data-claims-api,app.kubernetes.io/instance=main\", \"port\": 8080, \"pidEnvVar\": \"PORT_FORWARD_PID_DSTEW_API\"}" > .portmeta/dstew-api.json

      - name: Record port-forward metadata (SABC)
        if: always()
        shell: bash
        run: |
          pod_name=$(kubectl get pod -n ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }} -l "app.kubernetes.io/name=uat-submit-a-bulk-claim" -o jsonpath='{.items[0].metadata.name}')
          echo "{\"name\": \"sabc\", \"namespace\": \"${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}\", \"podName\": \"${pod_name}\", \"port\": 8082, \"pidEnvVar\": \"PORT_FORWARD_PID_SABC\"}" > .portmeta/sabc.json
          cat .portmeta/sabc.json

      - name: Record port-forward metadata (FSP API)
        if: always()
        shell: bash
        run: |
          echo "{\"name\": \"fsp-api\", \"namespace\": \"${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}\", \"podSelector\": \"app.kubernetes.io/name=laa-fee-scheme-api\", \"port\": 8085, \"pidEnvVar\": \"PORT_FORWARD_PID\"}" > .portmeta/fsp-api.json

      - name: Install jq
        run: apt-get update && apt-get install -y jq

      - name: Combine port-forward metadata
        if: always()
        shell: bash
        run: |
          jq -s '.' .portmeta/*.json > port-forward-config.json

      - name: Start BrowserStack Local
        run: npm run bstack:start
        env:
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          BROWSERSTACK_LOCAL_IDENTIFIER: run-${{ github.run_number }}


      - name: Run UI Tests
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          CUCUMBER_TAGS: ${{ inputs.tags }}
          KUBECONFIG_SABC: ${{ secrets.KUBECONFIG_SABC }}
          KUBECONFIG_DSTEW: ${{ secrets.KUBECONFIG_DSTEW }}
          KUBECONFIG_FSP: ${{ secrets.KUBECONFIG_FSP }}
        run: |
          ./scripts/wait-for-port.sh 5432 dstew-db 
          ./scripts/wait-for-port.sh 8080 dstew-api 
          ./scripts/wait-for-port.sh 8082 sabc
          ./scripts/wait-for-port.sh 8085 fsp-api

          npm run login
          npm run teardown
          npm run test:e2e:browserstack


      - name: Stop BrowserStack Local
        if: always()
        run: npm run bstack:stop


      - name: Teardown (global cleanup)
        if: always()
        run: npm run teardown

      - name: Publish Cucumber summary
        if: always()
        run: node scripts/cucumber-summary.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-reports
          path: reports
          if-no-files-found: warn
