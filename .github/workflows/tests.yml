  ui-tests:
    environment: uat
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-jammy 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          API_TOKEN=${{ secrets.API_TOKEN }}
          MFA_SECRET=${{ secrets.MFA_SECRET }}
          PASSWORD=${{ secrets.PASSWORD }}
          UI_BASE_URL=${{ secrets.UI_BASE_URL }}
          USERNAME=${{ secrets.USERNAME }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSL=${{ secrets.DB_SSL }}
          HEADLESS=true
          EOF

      - name: Run UI Tests
        env:
          KUBE_CLUSTER_SABC: ${{ secrets.KUBE_CLUSTER_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          KUBE_NAMESPACE_SABC: ${{ secrets.KUBE_NAMESPACE_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          KUBE_TOKEN_SABC: ${{ secrets.KUBE_TOKEN_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          KUBE_CERT_SABC: ${{ secrets.KUBE_CERT_LAA_SUBMIT_A_BULK_CLAIM_UAT }}
          KUBE_CLUSTER_DSTEW: ${{ secrets.KUBE_CLUSTER_LAA_DATA_CLAIMS_API_UAT }}
          KUBE_NAMESPACE_DSTEW: ${{ secrets.KUBE_NAMESPACE_LAA_DATA_CLAIMS_API_UAT }}
          KUBE_TOKEN_DSTEW: ${{ secrets.KUBE_TOKEN_LAA_DATA_CLAIMS_API_UAT }}
          KUBE_CERT_DSTEW: ${{ secrets.KUBE_CERT_LAA_DATA_CLAIMS_API_UAT }}
          CUCUMBER_TAGS: ${{ inputs.tags }}
        run: |

          ./scripts/authenticate-eks.sh "$KUBE_CLUSTER_SABC" "$KUBE_NAMESPACE_SABC" "$KUBE_TOKEN_SABC" "$KUBE_CERT_SABC"

          POD_LABEL_SABC="app.kubernetes.io/name=uat-submit-a-bulk-claim"
          POD_NAME_SABC=$(kubectl get pod -n "$KUBE_NAMESPACE_SABC" -l "$POD_LABEL_SABC" -o jsonpath='{.items[0].metadata.name}')
          echo "Port forwarding SaBC pod: $POD_NAME_SABC"
          kubectl port-forward -n "$KUBE_NAMESPACE_SABC" pod/"$POD_NAME_SABC" 8082:8082 > sabc-port-forward.log 2>&1 &
          PORT_FORWARD_PID_SABC=$!
          echo "Port-forward started for SaBC with PID $PORT_FORWARD_PID_SABC"

          ./scripts/authenticate-eks.sh "$KUBE_CLUSTER_DSTEW" "$KUBE_NAMESPACE_DSTEW" "$KUBE_TOKEN_DSTEW" "$KUBE_CERT_DSTEW"

          POD_LABEL_DSTEW="run=port-forward-pod"
          POD_NAME_DSTEW=$(kubectl get pod -n "$KUBE_NAMESPACE_DSTEW" -l "$POD_LABEL_DSTEW" -o jsonpath='{.items[0].metadata.name}')
          echo "Port forwarding data claims pod: $POD_NAME_DSTEW"
          kubectl port-forward -n "$KUBE_NAMESPACE_DSTEW" pod/"$POD_NAME_DSTEW" 5432:5432 > data-claims-port-forward.log 2>&1 &
          PORT_FORWARD_PID_DSTEW=$!
          echo "Port-forward started for data claims with PID $PORT_FORWARD_PID_DSTEW"

          node scripts/wait-for-port.js 8082
          node scripts/wait-for-port.js 5432

          # npm run login
          # npx cucumber-js -p bulksubmission --parallel 4 --retry 1

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: reports
          if-no-files-found: warn
