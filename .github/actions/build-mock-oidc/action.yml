name: build-mock-oidc
author: jamie.briggs
description: build-mock-oidc
runs:
  using: "composite"
  steps:
    - name: Check if Docker image exists
      id: check-image
      shell: bash
      run: |
        if docker image inspect laa-oidc-mock-server:latest >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Image laa-oidc-mock-server:latest already exists, skipping build"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Image laa-oidc-mock-server:latest not found, will build"
        fi

    - name: Checkout OIDC mock server
      if: steps.check-image.outputs.exists != 'true'
      uses: actions/checkout@v4
      with:
        repository: 'ministryofjustice/laa-oidc-mock-server'
        path: 'laa-oidc-mock-server'


    - name: Build and run the mock OIDC server
      if: steps.check-image.outputs.exists != 'true'
      working-directory: 'laa-oidc-mock-server'
      shell: bash
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        {
          # Build the mock OIDC JAR
          ./gradlew assemble
          # Build mock OIDC docker image
          docker build . -t laa-oidc-mock-server:latest
        }
