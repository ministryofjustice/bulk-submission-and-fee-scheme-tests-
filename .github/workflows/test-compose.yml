name: Run E2E Tests via Docker Compose

concurrency:
  group: run-e2e-tests
  cancel-in-progress: false

on:
  push:
    branches: [ feature/test-compose ]

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against'
        required: false
        default: 'main'

  schedule:
    # 6pm UTC Mon–Fri
    - cron: '0 18 * * 1-5'

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Checkout claims parent repository
        uses: actions/checkout@v4
        with:
          repository: 'ministryofjustice/laa-data-claims-parent'
          path: 'laa-data-claims-parent'
          # temporary branch
          ref: 'test-compose'
          submodules: recursive
          fetch-depth: 0

      - name: Build Services
        working-directory: ./laa-data-claims-parent/laa-submit-a-bulk-claim
        shell: bash
        run: |
          (
          cd laa-data-claims-parent/laa-submit-a-bulk-claim
          docker build \
          --build-arg BUILD_SOURCE=internal \
          --secret id=github_actor,env=GITHUB_ACTOR \
          --secret id=github_token,env=GITHUB_TOKEN \
          -t sabc-ui .
          ) &
          (
          cd laa-data-claims-parent/laa-data-claims-api
          docker build \
          --build-arg BUILD_SOURCE=internal \
          --secret id=github_actor,env=GITHUB_ACTOR \
          --secret id=github_token,env=GITHUB_TOKEN \
          -t claims-api .
          ) &
          (
          cd laa-data-claims-parent/laa-data-claims-event-service
          docker build \
          --build-arg BUILD_SOURCE=internal \
          --secret id=github_actor,env=GITHUB_ACTOR \
          --secret id=github_token,env=GITHUB_TOKEN \
          -t event-service .
          ) &
          (
          cd laa-data-claims-parent/laa-oidc-mock-server
          docker build \
          . -t laa-oidc-mock-server
          ) &
      
          wait
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run services
        working-directory: ./laa-data-claims-parent
        shell: bash
        run: |
          docker compose -f test-docker-compose.yml up -d sabc-ui event-service claims-api laa-mock-oidc-service

      - name: Wait for services
        working-directory: ./laa-data-claims-parent
        shell: bash
        run: |
          docker compose -f docker-compose.yml ps

      - name: Tear down
        if: ${{ always() }}
        working-directory: ./laa-data-claims-parent
        shell: bash
        run: |
          docker compose down claims-api event-service sabc-ui -v;