name: Run E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against'
        required: false
        default: 'main'

jobs:
  api-tests:
    environment: uat
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.54.2-jammy 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.4

      - name: Authenticate to the EKS cluster
        uses: ./.github/actions/authenticate-to-eks-cluster
        with:
          kube_cluster: ${{ secrets.KUBE_CLUSTER_LAA_FEE_SCHEME_API_UAT }}
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          kube_token: ${{ secrets.KUBE_TOKEN_LAA_FEE_SCHEME_API_UAT }}
          kube_cert: ${{ secrets.KUBE_CERT_LAA_FEE_SCHEME_API_UAT }}

      - name: Create .env file
        shell: bash
        run: |
          cat <<EOF > .env
          FSP_API_BASE_URL=${{ secrets.FSP_API_BASE_URL }}
          FSP_API_TOKEN=${{ secrets.FSP_API_TOKEN }}
          HEADLESS=true
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Port forward to FPS-API pod
        uses: ./.github/actions/port-forward
        with:
          kube_namespace: ${{ secrets.KUBE_NAMESPACE_LAA_FEE_SCHEME_API_UAT }}
          pod_selector: app.kubernetes.io/name=laa-fee-scheme-api
          local_port: "8085"
          pid_env_var: PORT_FORWARD_PID
          wait_label: fsp-api

      - name: Run API Tests
        run: |
          npm run test:api

      - name: Publish Cucumber summary
        if: always()
        run: node scripts/cucumber-summary.js

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsp-api-reports
          path: reports
          if-no-files-found: warn

  ui-tests:
    uses: ./.github/workflows/ui-tests.yml
    secrets: inherit
    strategy:
      matrix:
        feature:
          - bulkSubmission
          - content
          - fileUploadValidation
          - search
          - submissionValidation
    with:
      branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}
      feature: ${{ matrix.feature }}
