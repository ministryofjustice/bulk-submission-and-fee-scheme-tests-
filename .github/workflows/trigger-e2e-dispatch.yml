name: Test using E2E dispatch

on:
  workflow_call:
    inputs:
      sabc_image_tag:
        required: true
        type: string
      test_annotation:
        required: true
        type: string
      pr_number:
        required: false
        type: number
    secrets:
      gh_token:
        required: true

permissions:
  contents: read

jobs:

  dispatch-and-wait:
    runs-on: ubuntu-latest
    env:
      GITHUB_APP_ID: ${{ secrets.github_app_id }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.github_app_private_key }}
    steps:
      - name: Dispatch target workflow
        id: dispatch
        env:
          TARGET_REF: 'feature/test-compose'
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          TEST_ANNOTATION: ${{ inputs.test_annotation }}
          GH_TOKEN: ${{ secrets.gh_token }}
        run: |
          set -euo pipefail

          # Record time BEFORE dispatching
          DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "dispatch_time=${DISPATCH_TIME}" >> "$GITHUB_OUTPUT"
          echo "Dispatched at ${DISPATCH_TIME}"

          echo "Dispatching E2E in ministryofjustice/bulk-submission-and-fee-scheme-tests-"
          gh api -X POST "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/workflows/run-tests-on-runner.yml/dispatches" \
            -f ref="${TARGET_REF}" \
            -f inputs[test_annotation]="${TEST_ANNOTATION}" \
            -f inputs[sabc_image_tag]="${SABC_IMAGE_TAG}" \
            -f inputs[run_id]="${SABC_IMAGE_TAG}"

      - name: Find the created workflow run
        id: find_run
        env:
          TARGET_REF: 'feature/test-compose'
          DISPATCH_TIME: ${{ steps.dispatch.outputs.dispatch_time }}
          RUN_ID: ${{ inputs.sabc_image_tag }}
          SABC_IMAGE_TAG: ${{ inputs.sabc_image_tag }}
          TEST_ANNOTATION: ${{ inputs.test_annotation }}
          GH_TOKEN: ${{ secrets.gh_token }}
        run: |
          set -euo pipefail

          WORKFLOW_FILE_ID="$(gh api "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/workflows/run-tests-on-runner.yml" --jq '.id')"

          echo "Looking for run created after ${DISPATCH_TIME} with sabc_image_tag=${SABC_IMAGE_TAG}, test_annotation=${TEST_ANNOTATION}"

          for i in {1..30}; do
            RESPONSE="$(gh api \
              "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/workflows/${WORKFLOW_FILE_ID}/runs?branch=${TARGET_REF}&event=workflow_dispatch&per_page=10")"

            echo "--- Attempt $i: Raw API response ---"
            echo "${RESPONSE}" | jq '[.workflow_runs[] | {id, created_at, display_title, status}]'

            WORKFLOW_RUN_ID="$(echo "${RESPONSE}" | jq -r \
              "[.workflow_runs[] | select(.created_at >= \"${DISPATCH_TIME}\" and .display_title == \"Run ${TEST_ANNOTATION} E2E tests - ${SABC_IMAGE_TAG}\")] | sort_by(.created_at) | last | .id // empty")"

            if [ -n "${WORKFLOW_RUN_ID}" ]; then
              echo "run_id=${WORKFLOW_RUN_ID}" >> "$GITHUB_OUTPUT"
              echo "✓ Found run ${WORKFLOW_RUN_ID}"
              exit 0
            fi

            echo "Matching run not found yet (attempt $i/30), retrying..."
            sleep 5
          done


      - name: Link to found workflow run
        if: steps.find_run.outputs.run_id != ''
        env:
          WORKFLOW_RUN_ID: ${{ steps.find_run.outputs.run_id }}
          GH_TOKEN: ${{ secrets.gh_token }}
        run: |
          RUN_URL="https://github.com/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/runs/${WORKFLOW_RUN_ID}"
          echo "### 🔗 E2E Workflow Run" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[View dispatched workflow run](${RUN_URL})" >> "$GITHUB_STEP_SUMMARY"

      - name: Poll until completion
        env:
          WORKFLOW_RUN_ID: ${{ steps.find_run.outputs.run_id }}
        run: |
          set -euo pipefail

          # Should't need 1 hour, however some tests can take a long time
          for i in {1..120}; do
            STATUS="$(gh api "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/runs/${WORKFLOW_RUN_ID}" --jq '.status')"
            CONCLUSION="$(gh api "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/runs/${WORKFLOW_RUN_ID}" --jq '.conclusion // empty')"
            URL="$(gh api "repos/ministryofjustice/bulk-submission-and-fee-scheme-tests-/actions/runs/${WORKFLOW_RUN_ID}" --jq '.html_url')"

            echo "status=${STATUS}, conclusion=${CONCLUSION:-none}"
            echo "run_url=${URL}"

            if [ "${STATUS}" = "completed" ]; then
              if [ "${CONCLUSION}" = "success" ]; then
                echo "Remote workflow succeeded"
                echo "workflow_url=${URL}" >> "$GITHUB_OUTPUT"
                exit 0
              fi

              echo "Remote workflow failed: ${CONCLUSION:-unknown}"
              exit 1
            fi

            sleep 20
          done

          echo "Timed out waiting for remote workflow to complete"
          exit 1

