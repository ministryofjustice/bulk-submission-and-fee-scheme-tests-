name: Run E2E Tests via Docker Compose

concurrency:
  group: run-e2e-tests
  cancel-in-progress: false

on:
  push:
    branches: [ feature/test-compose ]

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests against'
        required: false
        default: 'main'

  schedule:
    # 6pm UTC Mon–Fri
    - cron: '0 18 * * 1-5'

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Checkout claims parent repository
        uses: actions/checkout@v4
        with:
          repository: 'ministryofjustice/laa-data-claims-parent'
          path: 'laa-data-claims-parent'
          submodules: recursive
          fetch-depth: 0

      - name: Build SaBC
        working-directory: ./laa-data-claims-parent/laa-submit-a-bulk-claim
        shell: bash
        run: |
          docker build \
            -t sabc-ui \
            --secret id=github_actor,env=GITHUB_ACTOR \
            --secret id=github_token,env=GITHUB_TOKEN \
            -t sabc-ui .

      - name: Run services
        working-directory: ./laa-data-claims-parent/laa-submit-a-bulk-claim
        shell: bash
        run: |
          docker compose -f docker-compose.yml up -d sabc-ui

      - name: Wait for services
        working-directory: ./laa-data-claims-parent
        shell: bash
        run: |
          docker compose -f docker-compose.yml ps

      - name: Tear down
        if: ${{ always() }}
        working-directory: ./laa-data-claims-parent
        shell: bash
        run: |
          docker compose down claims-api event-service sabc-ui -v;